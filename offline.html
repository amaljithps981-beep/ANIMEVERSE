<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - AnimeVerse</title>
    <link rel="icon" type="image/png" href="icon-192.png">
    <link rel="stylesheet" href="style.css">
    <style>
        .offline-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: radial-gradient(circle at top right, rgba(229, 9, 20, 0.1) 0%, transparent 40%),
                        radial-gradient(circle at bottom left, rgba(0, 229, 255, 0.05) 0%, transparent 40%),
                        #0b0b0e;
            color: white;
            text-align: center;
            padding: 20px;
        }
        .offline-card {
            max-width: 480px;
            padding: 40px 30px;
            background: rgba(25, 25, 30, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }
        .offline-icon {
            font-size: 64px;
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .offline-card h1 {
            font-size: 32px;
            font-weight: 800;
            margin: 0;
        }
        .offline-card h1 span {
            color: #e50914;
        }
        .offline-card p {
            font-size: 16px;
            color: var(--text-muted);
            line-height: 1.6;
            margin: 0;
        }
        .retry-btn {
            background: #e50914;
            color: white;
            border: none;
            padding: 14px 40px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(229, 9, 20, 0.4);
            transition: var(--transition);
        }
        .retry-btn:hover {
            transform: scale(1.05);
            background: var(--accent-hover);
            box-shadow: 0 0 25px rgba(229, 9, 20, 0.6);
        }
    </style>

    <!-- SEO & Open Graph Tags -->
    <meta name="description" content="AnimeVerse - The Ultimate Anime Streaming & Tracking Platform. Track, discover, and watch your favorite Anime, Movies, and TV Series.">
    <meta name="keywords" content="Anime, Streaming, Tracking, Manga, Movies, TV Series, AnimeVerse">
    <meta property="og:title" content="AnimeVerse">
    <meta property="og:description" content="The Ultimate Anime Tracking Platform.">
    <meta property="og:image" content="https://animeverse-4c635.web.app/icon-512.png">
    <meta property="og:url" content="https://animeverse-4c635.web.app">
    <meta name="twitter:card" content="summary_large_image">

</head>
<body>

    <div class="offline-container">
        <div class="offline-card">
            <div class="offline-icon">🔌</div>
            <h1>Anime<span>Verse</span></h1>
            <p>You are currently offline. Check your internet connection and try reloading the page.</p>
            <button class="retry-btn" onclick="window.location.reload()">Try Again</button>
        </div>
    </div>

</body>
</html>
